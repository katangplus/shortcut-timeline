<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shortcut — Project Timeline Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M10 6h8'/><path d='M12 16h6'/><path d='M3 3v16a2 2 0 0 0 2 2h16'/><path d='M8 11h7'/></svg>" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1><span>Shortcut</span> — Project Timeline</h1>
      <a class="datasource" id="datasourceLink" href="#" target="_blank" rel="noopener">
        Google Sheet &#x2197;
      </a>
    </div>
    <div class="header-right">
      <span id="lastUpdated"></span>
      <button class="icon-btn" id="btnRefresh" title="Refresh data from sheet">
        <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        <span style="font-size:12px">Refresh</span>
      </button>
      <button class="icon-btn" id="btnDark" title="Toggle dark mode">
        <svg id="iconSun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="iconMoon" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary" id="summary"></div>

  <!-- Toolbar: filter button + legend (sticky) -->
  <div class="toolbar" id="toolbar">
    <button class="filter-btn" id="btnFilter" title="Filters &amp; settings">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
      <span>Filters</span>
      <span class="filter-active-count" id="filterActiveCount" style="display:none"></span>
    </button>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--complete)"></div> Complete</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--wip)"></div> WIP</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--pending)"></div> Pending</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--requirement)"></div> Requirement</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--todo)"></div> To Do</div>
      <div class="legend-item" style="margin-left:12px"><div style="width:16px;height:2px;background:#ef4444;border-radius:1px"></div> Today</div>
    </div>
  </div>

  <!-- Filter Panel (popup) -->
  <div class="filter-overlay" id="filterOverlay"></div>
  <div class="filter-panel" id="filterPanel">
    <div class="filter-panel-header">
      <strong>Filters &amp; Settings</strong>
      <span class="filter-panel-close" id="btnFilterClose">&times;</span>
    </div>
    <div class="filter-panel-body">
      <div class="fp-grid">
        <div class="fp-section">
          <label>Module</label>
          <div class="multi-select" id="filterModule" data-placeholder="All Modules">
            <div class="multi-select-toggle">All Modules <span class="ms-arrow">&#9662;</span></div>
            <div class="multi-select-dropdown"></div>
          </div>
        </div>
        <div class="fp-section">
          <label>Status</label>
          <div class="multi-select" id="filterStatus" data-placeholder="All Statuses">
            <div class="multi-select-toggle">All Statuses <span class="ms-arrow">&#9662;</span></div>
            <div class="multi-select-dropdown"></div>
          </div>
        </div>
        <div class="fp-section">
          <label>Version</label>
          <div class="multi-select" id="filterVersion" data-placeholder="All Versions">
            <div class="multi-select-toggle">All Versions <span class="ms-arrow">&#9662;</span></div>
            <div class="multi-select-dropdown"></div>
          </div>
        </div>
        <div class="fp-section">
          <label>Columns</label>
          <div class="multi-select" id="columnToggle" data-placeholder="Columns">
            <div class="multi-select-toggle">Columns <span class="ms-arrow">&#9662;</span></div>
            <div class="multi-select-dropdown"></div>
          </div>
        </div>
        <hr class="fp-divider" />
        <div class="fp-section fp-grid-full">
          <label>Timeline</label>
          <div class="fp-row">
            <input type="month" id="filterMonthFrom" />
            <span style="color:var(--text-muted)">to</span>
            <input type="month" id="filterMonthTo" />
            <button class="icon-btn" id="btnResetRange" title="Reset range" style="padding:4px 8px;font-size:12px;">Reset</button>
          </div>
        </div>
        <hr class="fp-divider" />
        <div class="fp-section">
          <label>Group by</label>
          <select id="groupBy">
            <option value="none">None</option>
            <option value="module">Module</option>
            <option value="status">Status</option>
            <option value="version">Version</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Gantt Chart -->
  <div class="gantt-wrapper">
    <div class="gantt-scroll" id="ganttScroll">
      <table class="gantt-table" id="ganttTable"></table>
    </div>
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip"></div>

  <!-- Comment Popover -->
  <div class="comment-popover" id="commentPopover"></div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">Refreshing data from Google Sheet...</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
